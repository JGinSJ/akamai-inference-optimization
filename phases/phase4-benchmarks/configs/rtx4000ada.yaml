# Benchmark configuration — RTX 4000 Ada Generation
# -------------------------------------------------------
# Run with:
#   python -m harness.run_benchmark --config configs/rtx4000ada.yaml

# Human-readable label embedded in all output files and reports.
gpu_label: "RTX 4000 Ada"

# HuggingFace model ID. Must match the --model flag passed to vLLM.
model: "Qwen/Qwen2.5-VL-7B-Instruct"

# vLLM endpoint. Override at runtime or edit before deploying.
# TODO: Replace with the actual Akamai LKE service address or LoadBalancer IP.
vllm_url: "http://localhost:8000/v1/completions"

# Tag prefix used in output filenames and the comparison CSV.
# Results land in results/ada-b{batch}-c{concurrency}.json
tag_prefix: "ada"

# Akamai Cloud GPU node hourly price in USD.
# g2-gpu-rtx4000a1-l confirmed rate as of 2026-04.
gpu_hourly_usd: 0.96

# Total number of requests to send per (batch_size, concurrency) combination.
num_requests: 40

# max_tokens values to test. Each value drives one set of runs.
# In single-GPU vLLM the effective batch size is determined by concurrency,
# but max_tokens controls response length and thus affects throughput.
batch_sizes: [32, 128, 256]

# Number of concurrent in-flight requests.
concurrency_levels: [1, 4, 8, 16]

# Per-request HTTP timeout in seconds.
request_timeout_s: 120.0
