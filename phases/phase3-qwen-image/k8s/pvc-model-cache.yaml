# PersistentVolumeClaim — Qwen-Image HuggingFace model cache (Phase 3)
#
# Provides durable storage for downloaded Qwen2.5-VL model weights so that
# pod restarts do not re-download the model from HuggingFace.
# Sized at 30Gi: Qwen2.5-VL-7B-Instruct at float16 is ~14 GB on disk,
# leaving headroom for the tokenizer, processor files, and HF cache metadata.
#
# Storage class:
#   No storageClassName is set, so the cluster default is used.
#   On Akamai LKE the default storage class is "linode-block-storage".
#   Applying this manifest will automatically provision a Linode Block
#   Storage volume in the same region as the cluster (us-ord).
#   Verify the default with:
#     kubectl get storageclass
#
# Apply before starting the Qwen-Image deployment:
#   kubectl apply -f k8s/pvc-model-cache.yaml
#   kubectl apply -f k8s/deployment.yaml
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen-image-hf-cache
  namespace: inference
  labels:
    app: qwen-image
    phase: "3"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
