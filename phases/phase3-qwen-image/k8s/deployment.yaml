# Qwen-Image inference server — LKE Deployment + Service
#
# Before applying:
#   1. Build and push: docker build -t ghcr.io/jginsj/qwen-image-server:latest .
#      See Dockerfile at phases/phase3-qwen-image/Dockerfile.
#   2. Apply PVC first: kubectl apply -f k8s/pvc-model-cache.yaml
#   3. Install NVIDIA device plugin if not present — see infrastructure/README.md
#
# Apply with:
#   kubectl apply -f k8s/deployment.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen-image-config
  namespace: inference
  labels:
    app: qwen-image
    phase: "3"
data:
  # Confirmed: fits on RTX 4000 Ada (g2-gpu-rtx4000a1-l). See results/phase3_baseline_first_result.json.
  MODEL_NAME: "Qwen/Qwen2.5-VL-7B-Instruct"
  MAX_NEW_TOKENS: "256"
  MAX_BATCH_SIZE: "1"
  MAX_WAIT_S: "0.05"

  # OPTIMIZED=1 enables the full optimization bundle:
  #   bfloat16 + Flash Attention 2 + torch.compile(mode="reduce-overhead")
  # Individual USE_* flags can still override when OPTIMIZED=0.
  OPTIMIZED: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-image
  namespace: inference
  labels:
    app: qwen-image
    phase: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-image
  template:
    metadata:
      labels:
        app: qwen-image
    spec:
      nodeSelector:
        gpu-type: "rtx4000ada"

      tolerations:
      - key: "gpu-type"
        operator: "Equal"
        value: "rtx4000ada"
        effect: "NoSchedule"

      containers:
        - name: qwen-image
          image: "ghcr.io/jginsj/qwen-image-server:latest"
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: qwen-image-config
          command: ["uvicorn", "serve.app:app", "--host", "0.0.0.0", "--port", "8080"]
          resources:
            requests:
              cpu: "4"
              memory: "24Gi"
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            # Long initial delay — model loading takes time
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        # Persistent volume so model weights survive pod restarts.
        # TODO: Create a PVC named qwen-image-hf-cache in your LKE cluster.
        - name: hf-cache
          persistentVolumeClaim:
            claimName: qwen-image-hf-cache
