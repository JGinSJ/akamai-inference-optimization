spin_manifest_version = 2

[application]
name        = "prefix-cache-handler"
version     = "0.2.0"
description = "Fermyon Wasm caching proxy — Phase 2 Valkey + vLLM front door"

# ---------------------------------------------------------------------------
# Application-level variables
# In Kubernetes, pass these as environment variables:
#   SPIN_VARIABLE_VALKEY_ADDRESS=redis://valkey-svc.inference.svc.cluster.local:6379
#   SPIN_VARIABLE_VLLM_URL=http://vllm-svc.inference.svc.cluster.local:8000
#   SPIN_VARIABLE_CACHE_TTL=3600
# Locally:
#   export SPIN_VARIABLE_VALKEY_ADDRESS=redis://localhost:6379
#   export SPIN_VARIABLE_VLLM_URL=http://localhost:8000
# ---------------------------------------------------------------------------
[variables]
valkey_address = { required = true }
vllm_url       = { required = true }
cache_ttl      = { default = "3600" }

# ---------------------------------------------------------------------------
# Health check component
# Serves GET /health → 200 OK for Kubernetes readiness/liveness probes.
# Separate component so it carries no outbound permissions and does not
# need Spin variables.  Both components reference the same .wasm binary;
# the handler checks req.uri().path() == "/health" and returns immediately.
# ---------------------------------------------------------------------------
[[trigger.http]]
route     = "/health"
component = "health"

[component.health]
# Built by: cargo build -p health --target wasm32-wasip1 --release
source                 = "target/wasm32-wasip1/release/health.wasm"
allowed_outbound_hosts = []

# ---------------------------------------------------------------------------
# Proxy component
# Handles POST /v1/chat/completions.
# Cache HIT  → return Valkey-stored response, X-Cache: HIT.
# Cache MISS → forward to vLLM, store response, X-Cache: MISS.
#
# allowed_outbound_hosts is tightened to exact cluster-internal names.
# Note: the redis:// scheme is what the Spin Redis SDK expects.
# The actual backend is Valkey (open-source Redis-compatible fork).
# ---------------------------------------------------------------------------
[[trigger.http]]
route     = "/v1/chat/completions"
component = "prefix-cache-handler"

[component.prefix-cache-handler]
# Built by: cargo build -p proxy --target wasm32-wasip1 --release
source = "target/wasm32-wasip1/release/proxy.wasm"
allowed_outbound_hosts = [
    # Valkey — open-source Redis-compatible fork, Redis protocol
    "redis://valkey-svc.inference.svc.cluster.local:6379",
    # vLLM OpenAI-compatible backend
    "http://vllm-svc.inference.svc.cluster.local:8000",
]

[component.prefix-cache-handler.variables]
valkey_address = "{{ valkey_address }}"
vllm_url       = "{{ vllm_url }}"
cache_ttl      = "{{ cache_ttl }}"
