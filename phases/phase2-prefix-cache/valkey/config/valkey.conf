# Valkey 8.x configuration for Phase 2 prefix cache
# Deployed as a standalone instance on Akamai LKE (not cluster mode).
#
# TODO(prod): evaluate Valkey cluster mode if the cache needs to scale beyond
# a single node or requires HA. Cluster mode changes the client connection
# URL and the Spin redis SDK call sites.

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
bind 0.0.0.0
port 6379
protected-mode no

# ---------------------------------------------------------------------------
# Memory management
# ---------------------------------------------------------------------------
# Cap memory usage. When the limit is reached, evict LRU keys across all
# keyspaces — appropriate for a pure cache (no persistent data).
maxmemory 2gb
maxmemory-policy allkeys-lru

# ---------------------------------------------------------------------------
# Persistence — disabled for cache-only use
# ---------------------------------------------------------------------------
# RDB snapshots and AOF journaling are turned off. The cache is warm-up-only:
# after a restart, the first requests for each prefix will be cache misses.
# TODO(prod): enable AOF (appendonly yes) if durability is required.
save ""
appendonly no

# ---------------------------------------------------------------------------
# Clients
# ---------------------------------------------------------------------------
maxclients 1000
timeout 0

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
loglevel notice
logfile ""
