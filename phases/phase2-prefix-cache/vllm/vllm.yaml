# vLLM — LKE deployment for Phase 2 prefix caching backend
#
# This manifest wires LMCache as the external KV cache connector.
# KV cache blocks that overflow GPU VRAM are offloaded to Valkey
# (open-source Redis-compatible fork) in the inference namespace.
#
# Key changes from the Phase 2 baseline (vllm/vllm-openai:v0.8.3):
#   - Image upgraded to ghcr.io/jginsj/vllm-lmcache:v0.18.1
#     (LMCache 0.4.3 requires vLLM 0.17.x minimum — see lmcache docs)
#   - --enable-prefix-caching replaced with --no-enable-prefix-caching
#     (LMCache manages prefix reuse externally; the two do not stack)
#   - --kv-transfer-config added to activate the LMCacheConnectorV1
#   - LMCACHE_CONFIG_FILE env var and lmcache-config volume added
#
# Apply order (first-time):
#   kubectl apply -f vllm/lmcache-configmap.yaml
#   kubectl apply -f vllm/pvc-model-cache.yaml
#   kubectl apply -f vllm/vllm.yaml
#
# Rolling update (config already applied):
#   kubectl apply -f vllm/vllm.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: inference
  labels:
    app: vllm
    phase: "2"
data:
  # Confirmed live model — matches the deployed instance on akamai-lke-us-ord.
  # See results/phase2_prefix_cache_baseline.json.
  MODEL_NAME: "mistralai/Mistral-7B-Instruct-v0.2"
  MAX_NUM_SEQS: "256"
  MAX_NUM_BATCHED_TOKENS: "8192"
  GPU_MEMORY_UTILIZATION: "0.90"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: inference
  labels:
    app: vllm
    phase: "2"
spec:
  # Single replica for Phase 2.  Scale horizontally once model and load are
  # characterised in Phase 4.
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        gpu-type: "rtx4000ada"

      tolerations:
      - key: "gpu-type"
        operator: "Equal"
        value: "rtx4000ada"
        effect: "NoSchedule"

      containers:
        - name: vllm
          # Image upgraded from vllm/vllm-openai:v0.8.3 to v0.18.1.
          # Reason: LMCache 0.4.3 requires vLLM 0.17.x minimum per the
          # LMCache compatibility matrix (docs.lmcache.ai/getting_started/installation).
          # The custom image adds `pip install lmcache==0.4.3` on top of
          # vllm/vllm-openai:v0.18.1 — see vllm/Dockerfile.
          image: ghcr.io/jginsj/vllm-lmcache:v0.18.1
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: vllm-config
          env:
            # Path to the LMCache YAML config inside the container.
            # The file is mounted from the lmcache-config ConfigMap below.
            # LMCache reads this at startup to configure the Valkey backend.
            - name: LMCACHE_CONFIG_FILE
              value: /etc/lmcache/config.yaml
            # Fix hash consistency warning logged by LMCache at startup.
            # Without this, Python's ASLR-seeded hash randomisation causes
            # non-deterministic chunk key ordering across restarts.
            - name: PYTHONHASHSEED
              value: "0"
          command:
            - vllm
          args:
            - "serve"
            - "$(MODEL_NAME)"
            # LMCache replaces vLLM's local GPU block prefix cache.
            # --no-enable-prefix-caching is required — the two do not stack.
            - "--no-enable-prefix-caching"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--gpu-memory-utilization=$(GPU_MEMORY_UTILIZATION)"
            - "--max-num-seqs=$(MAX_NUM_SEQS)"
            - "--max-num-batched-tokens=$(MAX_NUM_BATCHED_TOKENS)"
            # Ceiling measured on RTX 4000 Ada (20 GB) with Mistral-7B-Instruct-v0.2.
            # vLLM 0.18.x uses the V1 block allocator by default, which may yield
            # a slightly different GPU block count at runtime.  Revalidate after
            # first deploy: kubectl -n inference logs -l app=vllm | grep "GPU blocks"
            - "--max-model-len=25664"
            # Activate LMCache KV connector.  kv_role=kv_both means this instance
            # acts as both prefill and decode, offloading overflow blocks to Valkey
            # (configured via LMCACHE_CONFIG_FILE above).
            - "--kv-transfer-config"
            - '{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
          resources:
            requests:
              cpu: "4"
              memory: "24Gi"
              # One GPU per pod.  Targets RTX 4000 Ada as configured in the node pool.
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            # LMCache config file mounted from lmcache-config ConfigMap.
            # LMCACHE_CONFIG_FILE env var points here.
            - name: lmcache-config
              mountPath: /etc/lmcache
              readOnly: true
      volumes:
        # Persistent volume for downloaded model weights so that pod restarts
        # do not re-download the model.
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
        # LMCache configuration — see vllm/lmcache-configmap.yaml.
        # Provides the Valkey backend URL, chunk size, and serialization format.
        - name: lmcache-config
          configMap:
            name: lmcache-config
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
  namespace: inference
  labels:
    app: vllm
    phase: "2"
spec:
  type: ClusterIP
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
