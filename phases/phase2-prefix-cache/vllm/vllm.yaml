# vLLM — LKE deployment for Phase 2 prefix caching backend
#
# The key flag is --enable-prefix-caching, which tells vLLM to maintain a
# GPU-side KV cache keyed by prompt prefix hash.  Requests that share a
# prompt prefix reuse the already-computed KV states.
#
# MODEL_NAME and nodeSelector are pre-configured for akamai-lke-us-ord.
# See serve_config.yaml for full flag reference and vllm serve syntax.
#
# Apply with:
#   kubectl apply -f vllm/vllm.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: inference
  labels:
    app: vllm
    phase: "2"
data:
  # Confirmed live model — matches the deployed instance on akamai-lke-us-ord.
  # See results/phase2_prefix_cache_baseline.json.
  MODEL_NAME: "mistralai/Mistral-7B-Instruct-v0.2"
  MAX_NUM_SEQS: "256"
  MAX_NUM_BATCHED_TOKENS: "8192"
  GPU_MEMORY_UTILIZATION: "0.90"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: inference
  labels:
    app: vllm
    phase: "2"
spec:
  # Single replica for Phase 2.  Scale horizontally once model and load are
  # characterised in Phase 4.
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        gpu-type: "rtx4000ada"

      containers:
        - name: vllm
          # TODO: Pin to a specific vLLM release tag before deploying to production.
          image: vllm/vllm-openai:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: vllm-config
          command:
            - vllm
          args:
            - "serve"
            - "$(MODEL_NAME)"
            - "--enable-prefix-caching"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--gpu-memory-utilization=$(GPU_MEMORY_UTILIZATION)"
            - "--max-num-seqs=$(MAX_NUM_SEQS)"
            - "--max-num-batched-tokens=$(MAX_NUM_BATCHED_TOKENS)"
            - "--max-model-len=25664"
          resources:
            requests:
              cpu: "4"
              memory: "24Gi"
              # One GPU per pod.  Targets RTX 4000 Ada or RTX PRO 6000 Blackwell
              # as configured in the node pool.
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        # Persistent volume for downloaded model weights so that pod restarts
        # do not re-download the model.
        # TODO: Create a PVC named vllm-model-cache in your LKE cluster with
        # sufficient capacity for your chosen model.
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
  namespace: inference
  labels:
    app: vllm
    phase: "2"
spec:
  type: ClusterIP
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
